work_dir: ./work_dir/carepd/xsub/lst_joint

# feeder
feeder: feeders.feeder_carepd.Feeder
train_feeder_args:
  data_path: ../data/CARE-PD-Skeleton/all_skeleton_label_pseudo_motion_relabel_64f.npz
  split: train
  debug: False
  random_choose: False
  random_shift: False
  random_move: False
  window_size: 64
  normalization: False
  random_rot: True
  p_interval: [0.5, 1]
  vel: False
  bone: False
  true_only: False

test_feeder_args:
  data_path: ../data/CARE-PD-Skeleton/all_skeleton_label_pseudo_motion_relabel_64f.npz
  split: test
  window_size: 64
  p_interval: [0.95]
  vel: False
  bone: False
  debug: False
  true_only: False
  
# model
model: model.ctrgcn.Model_lst_4part_carepd #model.ctrgcn.Model
model_args:
  num_class: 4
  num_point: 22
  num_person: 1
  graph: graph.care_pd.Graph
  k: 1
  head: ['ViT-B/32']
  graph_args:
    labeling_mode: 'spatial'

#optim
weight_decay: 0.0005
base_lr: 0.1
lr_decay_rate: 0.1
step: [90, 100] #[35,55]
warm_up_epoch: 5

# training
device: [0]
batch_size: 120
test_batch_size: 120
num_epoch: 110
nesterov: True
